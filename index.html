<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Note les moves NBA — BasketUSA</title>
<style>
  :root{
    --busa-red:#c0392b;
    --busa-blue:#2d83c1;
    --ink:#0f1b2d;
    --muted:#5f6b7a;
    --line:#e6ebf1;
    --soft:#f4f6f9;
    --on-blue:#ffffff;
    --on-blue-soft:rgba(255,255,255,.85);
    --blue-line:rgba(255,255,255,.28);
    --font:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font);color:var(--ink);background:transparent;line-height:1.45}
  .wrap{max-width:640px;margin:0 auto;padding:10px}
  .card{background:var(--busa-blue);border-radius:20px;overflow:hidden}

  /* Header */
  .head{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:16px 18px;border-top:4px solid var(--busa-red);background:rgba(255,255,255,.07)}
  .head img{height:28px;width:auto;display:block;background:#fff;padding:6px 10px;border-radius:9px}
  .head .sep{width:1px;height:26px;background:var(--blue-line)}
  .head h1{margin:0;font-size:17px;font-weight:700;color:var(--on-blue)}
  .head p{margin:1px 0 0;font-size:13px;color:var(--on-blue-soft);font-weight:400}

  /* Move rows (panneaux blancs sur le bleu) */
  .list{padding:14px 14px 4px;display:flex;flex-direction:column;gap:9px}
  .move{display:flex;align-items:center;gap:11px;background:#fff;border:1px solid rgba(0,0,0,.05);border-left:3px solid var(--busa-red);border-radius:10px;padding:9px 11px}
  .move.ext{border-left-color:#e08a2b}
  .move .ic{width:38px;height:38px;flex:0 0 38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;background:#f1f4f8;color:#15598f}
  .move.ext .ic{background:#f1f4f8;color:#a8431f}
  .ic img{width:30px;height:30px;object-fit:contain;display:block}
  .res-row .ic img{width:26px;height:26px}
  .move .body{flex:1;min-width:0}
  .move .nm{font-size:15px;font-weight:600;line-height:1.25;color:var(--ink)}
  .move .ac{font-size:13px;color:var(--muted);line-height:1.3;margin-top:1px}
  .move .ac b{color:var(--ink);font-weight:600}
  .move select{font-size:14px;font-family:var(--font);padding:7px 8px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);min-width:66px}
  .move select.set{border-color:var(--busa-blue);font-weight:600;color:var(--busa-blue)}

  /* Buttons */
  .actions{padding:12px 14px 18px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;border:0;border-radius:11px;padding:13px 16px;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;transition:filter .15s,opacity .15s}
  .btn-primary{background:var(--busa-red);color:#fff}
  .btn-primary:hover{filter:brightness(1.07)}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed}
  .btn-ghost{background:rgba(255,255,255,.14);border:1px solid var(--blue-line);color:var(--on-blue);font-weight:600}
  .btn-ghost:hover{background:rgba(255,255,255,.24)}
  .hint{text-align:center;font-size:12px;color:var(--on-blue-soft);margin:9px 0 0}

  /* Screen 2 */
  .screen{display:none}
  .screen.on{display:block}
  .recap{background:#fff;border-radius:12px;margin:0 14px 4px;padding:2px 14px}
  .res-row{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--line)}
  .res-row:last-child{border-bottom:0}
  .res-row .ic{width:34px;height:34px;flex:0 0 34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;background:#f1f4f8;color:#15598f}
  .res-row.ext .ic{background:#f1f4f8;color:#a8431f}
  .res-main{flex:1;min-width:0}
  .res-name{font-size:14px;font-weight:600;color:var(--ink)}
  .res-sub{font-size:12px;color:var(--muted)}
  .bar{height:7px;border-radius:5px;background:#eef1f5;overflow:hidden;margin-top:5px}
  .bar > span{display:block;height:100%;background:var(--busa-blue)}
  .res-note{flex:0 0 auto;text-align:right;min-width:74px}
  .res-note .big{font-size:17px;font-weight:700;color:var(--ink)}
  .res-note .you{font-size:11px;color:var(--busa-red);font-weight:600}
  .res-note .you b{color:var(--busa-red)}
  .section-t{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--on-blue-soft);margin:16px 14px 4px}
  .comm-load{padding:14px;color:var(--on-blue-soft);font-size:13px;text-align:center;background:rgba(255,255,255,.08);border-radius:12px;margin:0 14px}
  .comm-load code{background:rgba(255,255,255,.18);padding:1px 5px;border-radius:4px}

  /* Share */
  .share{display:grid;grid-template-columns:repeat(auto-fit,minmax(94px,1fr));gap:8px;padding:10px 14px 2px}
  .sbtn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:1px solid var(--line);background:#fff;border-radius:10px;padding:11px 8px;font-family:var(--font);font-size:13px;font-weight:600;color:var(--ink);cursor:pointer}
  .sbtn:hover{background:var(--soft)}
  .sbtn svg{width:16px;height:16px;display:block}
  .copied{text-align:center;font-size:12px;color:#d6f7e0;font-weight:600;min-height:16px;margin:4px 0 0}
  .foot{text-align:center;font-size:11px;color:rgba(255,255,255,.7);padding:12px 14px 16px}
</style>
</head>

/* =================================================================
   ÉTAT + ÉCRAN 1
   ================================================================= */
const $ = s => document.querySelector(s);
const votes = {};                  // id -> note (1..10)

function moveIcon(type){
  return type==='ext'
    ? '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>'
    : '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10H3l4-4"/><path d="M17 14h4l-4 4"/><path d="M3 10h14"/><path d="M21 14H7"/></svg>';
}

const list = $('#list');
MOVES.forEach(m => {
  const row = document.createElement('div');
  row.className = 'move ' + (m.type==='ext'?'ext':'trade');
  let opts = '<option value="">–/10</option>';
  for(let i=1;i<=10;i++) opts += `<option value="${i}">${i}</option>`;
  row.innerHTML =
    `<div class="ic">${logoHTML(m)}</div>
     <div class="body">
       <div class="nm">${m.player}</div>
       <div class="ac">${m.action}${m.detail?` · <b>${m.detail}</b>`:''}</div>
     </div>
     <select aria-label="Note pour ${m.player}">${opts}</select>`;
  const sel = row.querySelector('select');
  sel.addEventListener('change', () => {
    const v = parseInt(sel.value,10);
    if(v){ votes[m.id]=v; sel.classList.add('set'); }
    else { delete votes[m.id]; sel.classList.remove('set'); }
    refresh();
  });
  list.appendChild(row);
});

function refresh(){
  const n = Object.keys(votes).length;
  $('#validate').disabled = n===0;
  $('#vote-hint').textContent = n===0
    ? 'Note au moins un move pour valider.'
    : `${n} move${n>1?'s':''} noté${n>1?'s':''} sur ${MOVES.length}.`;
  postHeight();
}

/* =================================================================
   VALIDATION → écran 2
   ================================================================= */
$('#validate').addEventListener('click', () => {
  submitVotes();
  renderRecap();
  $('#screen-vote').classList.remove('on');
  $('#screen-result').classList.add('on');
  loadCommunity();
  window.scrollTo(0,0);
  postHeight();
});
$('#back').addEventListener('click', () => {
  $('#screen-result').classList.remove('on');
  $('#screen-vote').classList.add('on');
  postHeight();
});

function userAvg(){
  const ks = Object.keys(votes);
  if(!ks.length) return 0;
  return ks.reduce((a,k)=>a+votes[k],0)/ks.length;
}

function renderRecap(){
  const box = $('#recap');
  const rows = MOVES.filter(m=>votes[m.id]).map(m => `
    <div class="res-row ${m.type==='ext'?'ext':''}">
      <div class="ic">${logoHTML(m)}</div>
      <div class="res-main">
        <div class="res-name">${m.player}</div>
        <div class="res-sub">${m.action}</div>
      </div>
      <div class="res-note"><span class="big">${votes[m.id]}</span><span style="color:#9aa6b4">/10</span></div>
    </div>`).join('');
  box.innerHTML = rows + `<div class="res-row" style="border-top:2px solid var(--line)">
      <div class="res-main"><div class="res-name">Ta moyenne</div></div>
      <div class="res-note"><span class="big" style="color:var(--busa-red)">${userAvg().toFixed(1)}</span><span style="color:#9aa6b4">/10</span></div>
    </div>`;
}

/* =================================================================
   VOTES COMMUNAUTÉ (Google Apps Script + Google Sheet)
   ================================================================= */
const VOTED_KEY = 'busaRateMoves_voted_v1';
function submitVotes(){
  if(!CONFIG.votesUrl) return;
  if(localStorage.getItem(VOTED_KEY)) return;       // 1 vote par navigateur
  const choices = MOVES.filter(m=>votes[m.id]).map(m=>({id:m.id, name:m.player, rating:votes[m.id]}));
  if(!choices.length) return;
  const session = 'busa-'+Date.now().toString(36)+Math.random().toString(36).slice(2,8);
  try{
    fetch(CONFIG.votesUrl, {
      method:'POST', mode:'no-cors', keepalive:true,
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({session, choices})
    });
    localStorage.setItem(VOTED_KEY,'1');
  }catch(_){}
}
function loadCommunity(){
  const box = $('#community');
  if(!CONFIG.votesUrl){
    box.innerHTML = '<div class="comm-load">Active <code>CONFIG.votesUrl</code> (Google Apps Script) pour afficher les notes de la communauté.</div>';
    postHeight(); return;
  }
  box.innerHTML = '<div class="comm-load">Chargement de l’avis de la communauté…</div>';
  fetch(CONFIG.votesUrl + '?_=' + Date.now(), {method:'GET'})
    .then(r=>r.json())
    .then(renderCommunity)
    .catch(()=>{ box.innerHTML='<div class="comm-load">Notes de la communauté indisponibles pour le moment.</div>'; postHeight(); });
}
function renderCommunity(data){
  const box = $('#community');
  const map = {};
  (data && data.moves || []).forEach(r=>{ map[r.id] = {avg:+r.avg||0, count:+r.count||0}; });
  const rows = MOVES.map(m => {
    const d = map[m.id] || {avg:0,count:0};
    return {m, avg:d.avg, count:d.count};
  }).filter(r=>r.count>0).sort((a,b)=>b.avg-a.avg);
  if(!rows.length){
    box.innerHTML = '<div class="comm-load">Sois le premier à voter ! Les notes de la communauté s’afficheront ici.</div>';
    postHeight(); return;
  }
  box.innerHTML = '<div class="recap">' + rows.map(r => `
    <div class="res-row ${r.m.type==='ext'?'ext':''}">
      <div class="ic">${logoHTML(r.m)}</div>
      <div class="res-main">
        <div class="res-name">${r.m.player}</div>
        <div class="bar"><span style="width:${Math.round(r.avg/10*100)}%"></span></div>
      </div>
      <div class="res-note">
        <span class="big">${r.avg.toFixed(1)}</span><span style="color:#9aa6b4">/10</span>
        ${votes[r.m.id]?`<div class="you">toi <b>${votes[r.m.id]}</b></div>`:`<div class="res-sub">${r.count} vote${r.count>1?'s':''}</div>`}
      </div>
    </div>`).join('') + '</div>';
  postHeight();
}

/* =================================================================
   PARTAGE
   ================================================================= */
let HOST_URL='', PARENT_ORIGIN='*', gotParentUrl=false;
try{
  if(window.location.ancestorOrigins && window.location.ancestorOrigins.length) PARENT_ORIGIN=window.location.ancestorOrigins[0];
  else if(document.referrer) PARENT_ORIGIN=new URL(document.referrer).origin;
  if(document.referrer){ const r=new URL(document.referrer); if(r.origin!==location.origin) HOST_URL=document.referrer; }
}catch(_){}
window.addEventListener('message', e => {
  if(e.source && e.source!==window.parent) return;
  if(e.data && e.data.type==='busa-rate-parent-url' && typeof e.data.url==='string' && e.data.url){ HOST_URL=e.data.url; gotParentUrl=true; }
});
(function(){
  if(window.parent===window) return;
  let tries=0;
  (function ask(){ if(gotParentUrl||tries>=10) return; tries++;
    try{ window.parent.postMessage({type:'busa-rate-ready'}, PARENT_ORIGIN); }catch(_){}
    setTimeout(ask,400);
  })();
})();
const shareUrl = () => HOST_URL || CONFIG.shareUrl;
function shareText(){
  let t = `🏀 Mes notes des moves NBA sur BasketUSA !\n`;
  MOVES.filter(m=>votes[m.id]).slice(0,4).forEach(m=>{ t += `• ${m.player} : ${votes[m.id]}/10\n`; });
  t += `Moyenne ${userAvg().toFixed(1)}/10. Et toi, tu notes comment ? 👇`;
  return t;
}
const openShare = u => window.open(u,'_blank','noopener,noreferrer');
$('#shX').addEventListener('click', ()=>openShare(`https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText())}&url=${encodeURIComponent(shareUrl())}&hashtags=${encodeURIComponent(CONFIG.hashtags)}`));
$('#shFb').addEventListener('click', ()=>openShare(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl())}&quote=${encodeURIComponent(shareText())}`));
$('#shWa').addEventListener('click', ()=>openShare(`https://wa.me/?text=${encodeURIComponent(shareText()+'\n'+shareUrl())}`));
$('#shCopy').addEventListener('click', async ()=>{
  try{ await navigator.clipboard.writeText(shareText()+'\n'+shareUrl()); $('#copied').textContent='✓ Texte copié !'; }
  catch(_){ $('#copied').textContent='Copie impossible — sélectionne et copie manuellement.'; }
  setTimeout(()=>{$('#copied').textContent='';},2500);
});
if(navigator.share){
  const b=$('#shNative'); b.style.display='inline-flex';
  b.addEventListener('click', ()=>navigator.share({title:'Note les moves NBA — BasketUSA', text:shareText(), url:shareUrl()}).catch(()=>{}));
}

/* =================================================================
   TÉLÉCHARGER L'IMAGE DES VOTES (canvas)
   ================================================================= */
const FONT='system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif';
function rrect(ctx,x,y,w,h,r){ ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath(); }
function loadImg(src){ return new Promise(res=>{ const im=new Image(); im.onload=()=>res(im); im.onerror=()=>res(null); im.src=src; }); }
function ellipsize(ctx,t,maxW){ if(ctx.measureText(t).width<=maxW) return t; while(t.length>1 && ctx.measureText(t+'…').width>maxW) t=t.slice(0,-1); return t+'…'; }

$('#shImg').addEventListener('click', async () => {
  const btn=$('#shImg'); const old=btn.innerHTML;
  btn.disabled=true; btn.textContent='Génération…';
  try{
    const picked = MOVES.filter(m=>votes[m.id]);
    const logo = await loadImg(LOGO_B64);
    const teamImgs = {};
    await Promise.all(picked.map(async m=>{ if(TEAM_LOGOS[m.team]) teamImgs[m.team]=await loadImg(TEAM_LOGOS[m.team]); }));
    const scale=2, W=1080, pad=56;
    const headH=150, rowH=92, listTop=headH+44, footerH=120;
    const H = listTop + picked.length*rowH + footerH;
    const cv=document.createElement('canvas'); cv.width=W*scale; cv.height=H*scale;
    const ctx=cv.getContext('2d'); ctx.scale(scale,scale);

    ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#c0392b'; ctx.fillRect(0,0,W,6);

    if(logo){ const lh=46, lw=logo.width*(lh/logo.height); ctx.drawImage(logo, pad, 44, lw, lh); }
    ctx.textAlign='left'; ctx.fillStyle='#0f1b2d'; ctx.font='700 34px '+FONT;
    ctx.fillText('Mes notes des moves NBA', pad, 134);

    let y=listTop;
    picked.forEach(m=>{
      ctx.save(); rrect(ctx,pad,y,W-2*pad,rowH-16,16); ctx.fillStyle='#f4f6f9'; ctx.fill(); ctx.restore();
      const rh=rowH-16;
      const tImg=teamImgs[m.team];
      const ls2=52, lcx=pad+18, lcy=y+(rh-ls2)/2;
      if(tImg){ const r2=tImg.width/tImg.height, dw=r2>=1?ls2:ls2*r2, dh=r2>=1?ls2/r2:ls2; ctx.drawImage(tImg, lcx+(ls2-dw)/2, lcy+(ls2-dh)/2, dw, dh); }
      const cx=pad+18+ls2+18;
      ctx.fillStyle = m.type==='ext' ? '#a8431f' : '#15598f';
      ctx.font='700 13px '+FONT; ctx.fillText(m.type==='ext'?'PROLONGATION':'TRADE', cx, y+24);
      ctx.fillStyle='#0f1b2d'; ctx.font='700 24px '+FONT;
      ctx.fillText(ellipsize(ctx,m.player,W-cx-150), cx, y+50);
      ctx.fillStyle='#5f6b7a'; ctx.font='400 16px '+FONT;
      ctx.fillText(ellipsize(ctx,m.action+(m.detail?' · '+m.detail:''),W-cx-150), cx, y+rowH-30);
      // badge note
      const bw=110, bx=W-pad-bw-14, by=y+(rowH-16-54)/2;
      ctx.save(); rrect(ctx,bx,by,bw,54,14); ctx.fillStyle='#2d82c2'; ctx.fill(); ctx.restore();
      ctx.fillStyle='#ffffff'; ctx.textAlign='center';
      ctx.font='800 30px '+FONT; ctx.fillText(votes[m.id], bx+bw/2-14, by+37);
      ctx.font='700 16px '+FONT; ctx.fillText('/10', bx+bw/2+26, by+35);
      ctx.textAlign='left';
      y+=rowH;
    });

    ctx.textAlign='left'; ctx.fillStyle='#0f1b2d'; ctx.font='700 26px '+FONT;
    ctx.fillText('Moyenne', pad, y+44);
    ctx.fillStyle='#c0392b'; ctx.font='800 34px '+FONT;
    ctx.fillText(userAvg().toFixed(1)+' /10', pad+150, y+46);
    ctx.fillStyle='#9aa6b4'; ctx.textAlign='right'; ctx.font='400 15px '+FONT;
    ctx.fillText('basketusa.com — Note les moves NBA', W-pad, y+44);

    const url = cv.toDataURL('image/png');
    const a=document.createElement('a'); a.href=url; a.download='mes-notes-moves-nba.png'; a.click();
  }catch(_){ alert('Impossible de générer l’image sur ce navigateur.'); }
  finally{ btn.disabled=false; btn.innerHTML=old; }
});

   HAUTEUR IFRAME (WordPress)
   ================================================================= */
function postHeight(){
  if(window.parent===window) return;
  const h = document.documentElement.scrollHeight;
  try{ window.parent.postMessage({type:'busa-rate-height', height:h}, PARENT_ORIGIN); }catch(_){}
}
window.addEventListener('load', postHeight);
window.addEventListener('resize', postHeight);
refresh();
</script>
